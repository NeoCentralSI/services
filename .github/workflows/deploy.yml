# ─────────────────────────────────────────────────────────────────
# CI/CD – Backend (services)
# Triggers on push to main branch
# Self-hosted runner on VM → build Docker image locally → deploy
# ─────────────────────────────────────────────────────────────────
name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_DIR: /www/wwwroot/neocentral
  IMAGE_TAG: neocentral/services:latest

jobs:
  # ── Build & Deploy ─────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image locally
        run: docker build -t ${{ env.IMAGE_TAG }} .

      - name: Update docker-compose on VM
        run: |
          cp -f docker-compose.prod.yml ${{ env.DEPLOY_DIR }}/docker-compose.yml

      - name: Run Prisma migrations before app start
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose run --rm --no-deps backend npx prisma migrate resolve --rolled-back 20260512003000_add_student_research_method_completed || true
          docker compose run --rm --no-deps backend npx prisma migrate deploy

      - name: Deploy backend
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose up -d backend --force-recreate
          echo "⏳ Waiting for backend to be healthy..."
          sleep 10

      - name: Cleanup old images
        run: docker image prune -f

      - name: Verify deployment
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose ps backend
          curl --fail --show-error --silent http://127.0.0.1:3000/health
          echo "✅ Backend deployed successfully"
